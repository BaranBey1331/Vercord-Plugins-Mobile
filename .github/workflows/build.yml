name: Vercord Otomatik Eklenti Derleyici

# Herhangi bir TS dosyası değiştiğinde veya main dalına kod eklendiğinde çalışır
on:
  push:
    branches:
      - main
    paths:
      - '**/*.ts'
  workflow_dispatch: # İstersen Github üzerinden manuel de tetikleyebilirsin

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    # Release oluşturmak için gereken Github izinleri
    permissions:
      contents: write

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Esbuild Kurulumu
        run: npm install -g esbuild

      - name: Tüm Eklentileri Tara ve Derle (Auto-Discovery)
        run: |
          echo ">>> VERCORD MULTI-PLUGIN DERLEYICI BASLATILDI <<<"
          
          # Derlenen dosyaların toplanacağı klasörü oluştur
          mkdir -p release_builds
          
          # Repodaki tüm klasörleri dön
          for plugin_dir in */; do
            # Sondaki slash (/) işaretini temizle (Örn: "Message-Logger/" -> "Message-Logger")
            plugin_name=${plugin_dir%/}
            
            # .github veya gizli klasörleri atla
            if [[ "$plugin_name" == .* ]]; then continue; fi
            if [[ "$plugin_name" == "release_builds" ]]; then continue; fi
            
            # Klasör içindeki ilk .ts dosyasını bul (index.ts, logger.ts fark etmez)
            entry_file=$(ls "$plugin_name"/*.ts 2>/dev/null | head -n 1)
            
            # Eğer klasörde .ts dosyası varsa derlemeyi başlat
            if [ -n "$entry_file" ]; then
              echo "✅ Bulundu: $plugin_name ($entry_file)"
              
              # JavaScript değişken adlarında tire (-) kullanılamaz, tireleri alt çizgiye (_) çeviriyoruz
              global_name=$(echo "$plugin_name" | tr '-' '_')
              
              # Esbuild ile derle, çıktı adını klasör adı yap (Örn: Message-Logger.js)
              esbuild "$entry_file" \
                --bundle \
                --minify \
                --format=iife \
                --global-name="vercordPlugin_${global_name}" \
                --external:@vendetta \
                --external:@vendetta/* \
                --outfile="release_builds/${plugin_name}.js"
                
              echo "🚀 Derlendi: release_builds/${plugin_name}.js"
            else
              echo "⏩ Atlandı: $plugin_name (TS dosyası bulunamadı)"
            fi
          done

      - name: Otomatik Release (Sürüm) Oluştur ve Yükle
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "latest"
          name: "Vercord Plugins - Canlı Sürüm (Auto-Update)"
          # release_builds klasöründeki TÜM .js dosyalarını Release'e yükle
          files: release_builds/*.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
